repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        additional_dependencies:
          - types-requests>=2.31.0
          - types-PyYAML>=6.0
          - pydantic>=2.0.0
        args: [--config-file=pyproject.toml]
        pass_filenames: false
        files: ^src/
